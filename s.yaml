# Serverless Devs 部署配置 - 完整 Next.js（含 API）到阿里云函数计算
# 使用前：npm run build，然后 s deploy
# 文档见 ALIYUN_FC.md
edition: 3.0.0
name: funds-next
access: default

resources:
  funds-next:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: funds-next
      runtime: custom.debian10
      memorySize: 1024
      timeout: 60
      instanceConcurrency: 10
      customRuntimeConfig:
        command:
          - node
        args:
          - scripts/fc-server.js
      code: ./
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
